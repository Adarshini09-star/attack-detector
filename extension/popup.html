<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishNet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05060f; --s1:#0d0e1a; --s2:#131428;
  --border:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.12);
  --cyan:#00e5ff; --purple:#7b2fff; --text:#eeeef8; --muted:#5a5a7a;
  --danger:#ff4444; --safe:#00e5a0; --warn:#ffd600;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:420px;min-height:540px;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at -10% -10%,rgba(0,229,255,0.06) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 110% 110%,rgba(123,47,255,0.08) 0%,transparent 55%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;padding:0 0 20px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;border-bottom:1px solid var(--border);background:rgba(13,14,26,0.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,rgba(0,229,255,0.14),rgba(123,47,255,0.2));border:1px solid rgba(0,229,255,0.24);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text{font-size:14px;font-weight:700;letter-spacing:-0.01em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.chips{display:flex;gap:5px;}
.chip{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-family:'JetBrains Mono',monospace;border:1px solid var(--border);}
.chip-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);}
.chip-dot.live{background:var(--safe);box-shadow:0 0 5px var(--safe);animation:pulse 2s infinite;}
.chip-dot.warn{background:var(--warn);}

/* LANG */
.lang-bar{display:flex;align-items:center;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);}
.lang-label{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-right:6px;}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:5px;cursor:pointer;transition:all 0.15s;}
.lang-btn:hover{border-color:rgba(0,229,255,0.3);color:var(--cyan);}
.lang-btn.active{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.35);color:var(--cyan);}

/* SCAN PAGE BUTTON */
.scan-page-btn{margin:10px 16px 0;width:calc(100% - 32px);padding:10px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);border-radius:9px;color:rgba(0,229,255,0.8);font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:7px;}
.scan-page-btn:hover{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.4);color:var(--cyan);}

/* TABS */
.tab-row{display:flex;gap:3px;padding:10px 16px 0;}
.tab-btn{flex:1;background:transparent;border:1px solid var(--border);border-bottom:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;padding:9px 10px;border-radius:8px 8px 0 0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--s1);color:var(--text);border-color:var(--b2);border-bottom:1px solid var(--s1);}
.tab-btn.active svg{color:var(--cyan);}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b2);border-radius:0 0 12px 12px;margin:0 16px;padding:16px;}
.section{display:none;}.section.active{display:block;}

/* INPUTS */
textarea,input[type=text]{width:100%;background:rgba(140,110,240,0.06);border:1px solid rgba(140,110,240,0.24);border-radius:8px;color:#ddd8ff;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;padding:11px 13px;resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
textarea{height:110px;}input[type=text]{height:42px;}
textarea:focus,input[type=text]:focus{border-color:rgba(140,110,240,0.55);box-shadow:0 0 0 3px rgba(100,60,200,0.09);}
textarea::placeholder,input::placeholder{color:rgba(140,120,190,0.42);font-size:11.5px;}

.autofill-btn{margin-top:7px;display:flex;align-items:center;gap:5px;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.16);border-radius:6px;color:rgba(0,229,255,0.65);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;transition:all 0.15s;width:fit-content;}
.autofill-btn:hover{background:rgba(0,229,255,0.09);color:var(--cyan);border-color:rgba(0,229,255,0.32);}

/* ANALYZE BUTTON */
.analyze-btn{width:100%;margin-top:12px;padding:12px 18px;background:linear-gradient(135deg,rgba(0,229,255,0.11),rgba(123,47,255,0.13));border:1px solid rgba(0,229,255,0.26);border-radius:9px;color:var(--cyan);font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.analyze-btn:hover{border-color:rgba(0,229,255,0.5);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,0.09);}
.analyze-btn:active{transform:translateY(0);}
.analyze-btn.loading{pointer-events:none;opacity:0.6;}
.spinner{width:14px;height:14px;border:2px solid rgba(0,229,255,0.16);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.65s linear infinite;display:none;}
.loading .spinner{display:block;}.loading .btn-txt{display:none;}

/* RESULT BOX — full featured */
.result-box{margin-top:14px;border-radius:11px;overflow:hidden;border:1px solid var(--border);animation:fadeUp 0.35s ease;}
.result-header{display:flex;align-items:center;gap:8px;padding:10px 13px;font-size:10.5px;font-family:'JetBrains Mono',monospace;letter-spacing:0.09em;text-transform:uppercase;}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.result-score{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;opacity:0.75;}
.result-body{padding:13px 13px 15px;border-top:1px solid var(--border);}
.verdict{font-weight:800;font-size:15px;margin-bottom:5px;letter-spacing:-0.01em;}
.ml-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.22);padding:3px 9px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(180,140,255,0.85);margin-bottom:9px;}
.explanation{font-size:12.5px;line-height:1.65;opacity:0.82;margin-bottom:10px;}
.tactics{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.tactic-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;font-weight:500;}
.risk-bar-section{margin-bottom:10px;}
.risk-bar-label-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.risk-bar-lbl{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.risk-bar-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.risk-bar-fill{height:100%;border-radius:3px;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}
.source-row{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:8px;}
.tips-section-inner{border-top:1px solid var(--border);padding-top:10px;margin-top:2px;}
.tips-section-lbl{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;}
.tip-row{font-size:11.5px;color:rgba(180,180,200,0.65);padding:3px 0;display:flex;gap:6px;}
.tip-arrow{color:rgba(0,229,255,0.55);flex-shrink:0;}

/* Color variants */
.result-box.danger .result-header{background:rgba(255,68,68,0.08);color:var(--danger);}
.result-box.danger .rdot{background:var(--danger);box-shadow:0 0 6px var(--danger);}
.result-box.danger .tactic-tag{background:rgba(255,68,68,0.1);color:#ff9090;border:1px solid rgba(255,68,68,0.22);}
.result-box.danger .risk-bar-fill{background:linear-gradient(90deg,#ff4444,#ff8800);}
.result-box.warn .result-header{background:rgba(255,200,0,0.08);color:var(--warn);}
.result-box.warn .rdot{background:var(--warn);box-shadow:0 0 6px var(--warn);}
.result-box.warn .tactic-tag{background:rgba(255,200,0,0.1);color:#ffe566;border:1px solid rgba(255,200,0,0.22);}
.result-box.warn .risk-bar-fill{background:linear-gradient(90deg,#ffd600,#ff9900);}
.result-box.safe .result-header{background:rgba(0,229,160,0.08);color:var(--safe);}
.result-box.safe .rdot{background:var(--safe);box-shadow:0 0 6px var(--safe);}
.result-box.safe .tactic-tag{background:rgba(0,229,160,0.1);color:#7dffd0;border:1px solid rgba(0,229,160,0.22);}
.result-box.safe .risk-bar-fill{background:linear-gradient(90deg,#00e5a0,#00b4d8);}
.result-box.info .result-header{background:rgba(0,229,255,0.06);color:var(--cyan);}
.result-box.info .rdot{background:var(--cyan);animation:pulse 1.4s infinite;}

/* BOTTOM THREATS GRID */
.threats-section{padding:12px 16px 0;}
.threats-lbl{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:9px;}
.threats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.threat-card{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:10px 9px;transition:border-color 0.18s,transform 0.15s;}
.threat-card:hover{border-color:rgba(123,47,255,0.3);transform:translateY(-1px);}
.tc-icon{font-size:17px;margin-bottom:5px;}
.tc-title{font-size:10.5px;font-weight:700;color:var(--text);margin-bottom:3px;}
.tc-desc{font-size:9.5px;color:var(--muted);line-height:1.45;}

.footer{text-align:center;padding:12px 16px 0;font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);opacity:0.35;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <span class="logo-text">PhishNet</span>
    </div>
    <div class="chips">
      <div class="chip"><span class="chip-dot" id="mlDot"></span><span id="mlText" style="color:var(--muted)">ML</span></div>
      <div class="chip"><span class="chip-dot" id="aiDot"></span><span id="aiText" style="color:var(--muted)">AI</span></div>
    </div>
  </div>

  <!-- LANG -->
  <div class="lang-bar">
    <span class="lang-label">Lang</span>
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('hi')">हि</button>
    <button class="lang-btn" onclick="setLang('kn')">ಕ</button>
  </div>

  <!-- SCAN CURRENT PAGE BUTTON -->
  <button class="scan-page-btn" onclick="scanCurrentPage()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Scan Current Page (Gmail / WhatsApp)
  </button>

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab-btn active" id="msgTab" onclick="showTab('text')">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Message
    </button>
    <button class="tab-btn" id="urlTabBtn" onclick="showTab('url')">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      URL Scanner
    </button>
  </div>

  <!-- CARD -->
  <div class="card">
    <div id="textSection" class="section active">
      <textarea id="messageInput" placeholder="Paste a suspicious message, email, or SMS here..."></textarea>
      <button class="analyze-btn" id="analyzeTextBtn" onclick="analyzeText()">
        <div class="spinner"></div>
        <span class="btn-txt">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" style="vertical-align:-3px;margin-right:4px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Analyze Message
        </span>
      </button>
    </div>
    <div id="urlSection" class="section">
      <input type="text" id="urlInput" placeholder="Paste a suspicious URL or link here...">
      <button class="autofill-btn" onclick="autofillCurrentURL()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Use current page URL
      </button>
      <button class="analyze-btn" id="analyzeUrlBtn" onclick="analyzeURL()">
        <div class="spinner"></div>
        <span class="btn-txt">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" style="vertical-align:-3px;margin-right:4px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Scan URL
        </span>
      </button>
    </div>
    <div id="resultBox"></div>
  </div>

  <!-- THREATS GRID -->
  <div class="threats-section">
    <div class="threats-lbl">Threat Types Detected</div>
    <div class="threats-grid">
      <div class="threat-card"><div class="tc-icon">🎣</div><div class="tc-title">Phishing</div><div class="tc-desc">Fake pages stealing credentials.</div></div>
      <div class="threat-card"><div class="tc-icon">🔗</div><div class="tc-title">Malicious Links</div><div class="tc-desc">URLs to harmful sites.</div></div>
      <div class="threat-card"><div class="tc-icon">⚠️</div><div class="tc-title">Social Engineering</div><div class="tc-desc">Manipulation via urgency or fear.</div></div>
    </div>
  </div>

  <div class="footer">phishnet v3.0 · ml + claude ai · gmail & whatsapp scanner</div>
</div>
<script src="url_features.js"></script>
<script src="popup.js"></script>
</body>
</html>
